@if (card(); as cardData) {
  <div class="card-container" [class.zoom-on-hover]="showTooltip()">
  <img
    [src]="cardImage()"
    [alt]="cardData.name"
    (click)="open()"
    [pTooltip]="showTooltip() ? cardData.name : undefined"
    tooltipPosition="top"
    class="rounded-lg"
    [class.cursor-pointer]="showTooltip()"
    [class.cursor-default]="!showTooltip()"
  />
  @if (hasFaces()) {
    <button
      (click)="flipCard(); $event.stopPropagation()"
      class="absolute top-2 right-2 w-9 h-9 bg-white hover:bg-gray-100 text-purple-600 rounded-full shadow-xl hover:shadow-2xl transition-all duration-300 flex items-center justify-center z-10 border-2 border-purple-500"
      aria-label="Flip card"
    >
      <i class="pi pi-refresh text-lg font-bold"></i>
    </button>
  }
</div>
}
