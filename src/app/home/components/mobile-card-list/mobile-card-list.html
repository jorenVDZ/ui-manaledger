<div class="mobile-card-list">
  @for (card of cards(); track trackByCardId($index, card); let i = $index) {
    <div
      #cardElement
      class="card-wrapper"
      [class.focused]="isFocused(i)">
      <div class="card-image-container">
        <img
          [src]="card.imageUris?.normal || card.imageUris?.large || card.imageUris?.small"
          [alt]="card.name"
          class="card-image"
          loading="lazy"
        />
      </div>
    </div>
  }

  @if (loading()) {
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading more cards...</p>
    </div>
  }
</div>
