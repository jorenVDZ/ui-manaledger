<div class="mobile-card-list">
  @for (card of cards(); track trackByCardId($index, card); let i = $index) {
    <div
      #cardElement
      class="card-wrapper"
      [class.focused]="isFocused(i)">
      <div class="card-image-container relative">
        <img
          [src]="getCardImage(card)"
          [alt]="card.name"
          class="card-image"
          loading="lazy"
        />
        @if (hasFaces(card)) {
          <button
            (click)="flipCard(card, $event)"
            class="absolute top-3 right-3 w-12 h-12 bg-white hover:bg-gray-100 text-purple-600 rounded-full shadow-xl hover:shadow-2xl transition-all duration-300 flex items-center justify-center z-10 border-2 border-purple-500"
            aria-label="Flip card"
          >
            <i class="pi pi-refresh text-xl font-bold"></i>
          </button>
        }
      </div>
    </div>
  }

  @if (loading()) {
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading more cards...</p>
    </div>
  }
</div>
