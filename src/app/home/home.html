<div class="min-h-screen">
  <div class="max-w-[115rem] mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl dark:shadow-purple-500/10 p-8 md:p-12">
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-gray-100 mb-4 bg-gradient-to-r from-pink-500 to-purple-600 dark:from-pink-400 dark:to-purple-500 bg-clip-text text-transparent">Home</h1>
      @if (authService.currentUser()) {
        <p class="text-xl text-gray-700 dark:text-gray-300">Welcome to ManaLedger, <span class="font-semibold text-purple-600 dark:text-purple-400">{{ authService.currentUser()!.email }}</span>!</p>
      } @else {
        <p class="text-xl text-gray-500 dark:text-gray-400">Loading...</p>
      }
    </div>
  </div>
</div>
