<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl dark:shadow-purple-500/10 p-8 space-y-6">
      <!-- Header -->
      <div class="text-center space-y-2 mb-6">
        <div class="flex justify-center mb-4">
          <div class="w-16 h-16 bg-gradient-to-br from-pink-400 to-pink-600 dark:from-pink-500 dark:to-pink-700 rounded-full flex items-center justify-center">
            <i class="pi pi-lock text-3xl text-white"></i>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">Welcome Back</h1>
        <p class="text-gray-500 dark:text-gray-400">Sign in to your account to continue</p>
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
        <p-message
          severity="error"
          styleClass="w-full"
        >
          {{errorMessage}}
        </p-message>
      }

      <!-- Login Form -->
      <form (ngSubmit)="onLogin()" class="space-y-6">
        <!-- Email Field -->
        <div class="space-y-2">
          <p-floatlabel>
            <input
              pInputText
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              required
              [disabled]="loading()"
              class="w-full"
            />
            <label for="email">Email Address</label>
          </p-floatlabel>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <p-floatlabel>
            <p-password
              [(ngModel)]="password"
              name="password"
              inputId="password"
              [toggleMask]="true"
              [feedback]="false"
              [disabled]="loading()"
              class="w-full"
              inputStyleClass="w-full"
            />
            <label for="password">Password</label>
          </p-floatlabel>
        </div>

        <!-- Login Button -->
        <div class="pt-2">
          <p-button
            label="Sign In"
            icon="pi pi-sign-in"
            [loading]="loading()"
            type="submit"
            styleClass="w-full"
            severity="primary"
          />
        </div>
      </form>
    </div>
  </div>
</div>
