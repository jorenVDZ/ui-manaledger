<div class="max-w-[95%] md:max-w-[80%] py-6 px-8 m-auto">
  <h1 class="text-4xl font-bold mb-6">Home</h1>
  <app-card-search />
</div>
@if (showScrollTop()) {
  <button
    (click)="scrollToTop()"
    class="fixed bottom-8 right-8 w-12 h-12 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white rounded-full shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center z-50"
    aria-label="Scroll to top"
  >
    <i class="pi pi-arrow-up text-xl"></i>
  </button>
}
